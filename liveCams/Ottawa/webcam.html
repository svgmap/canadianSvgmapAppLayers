<!DOCTYPE html>
<html property="title,itemId,internalId,name,name_fr,owner">
<head>
    <meta charset="UTF-8">
    <title>Ottawa Traffic Cameras (HLA Layer)</title>
    <script src="https://cdn.jsdelivr.net/gh/svgmap/svgmapjs@latest/svgMapLayerLib.js"></script>
    <script>
        // 設定
        const cameraListUrl = "https://traffic.ottawa.ca/map/service/camera";
        const cameraImageBase = "https://traffic.ottawa.ca/camera?id=";

        /**
         * 初期化：JSONを取得してGeoJSONとして描画
         */
        onload = async function() {
            try {
                // JSONリストを取得 (CORS回避のため svgMap.getCORSURL を使用)
                const response = await fetch(svgMap.getCORSURL(cameraListUrl));
                const rawData = await response.json();
                
                // GeoJSONへ変換（camera_numberをキーに採用）
                const gjs = convertOttawaToGeoJSON(rawData);
                console.log(gjs);
                const metaDict = ["title", "itemId", "internalId", "name", "name_fr", "owner"];
                
                // 描画設定
                svgMap.setShowPoiProperty(showOttawaProperty, layerID);
                // 独自のプロパティリストをドキュメントにセット
                document.documentElement.setAttribute("property", metaDict.join(","));
                
                // 地図上に展開
                svgMapGIStool.drawGeoJson(gjs, layerID, "darkgreen", 2, "white", "p4", "title", null, null, metaDict);
                svgMap.refreshScreen();
            } catch (e) {
                console.error("Ottawa Layer Load Error:", e);
            }
        }

        /**
         * オタワ市JSON構造をGeoJSONに変換
         * camera_number (2016等) を画像取得用の itemId に割り当てる
         */
        function convertOttawaToGeoJSON(rawData) {
            const cameraArray = rawData.cameras || [];
            const features = cameraArray.map(cam => {
                const camKey = cam.camera_number; // URLに使用される真のID
                return {
                    type: "Feature",
                    geometry: {
                        type: "Point",
                        coordinates: [parseFloat(cam.longitude), parseFloat(cam.latitude)]
                    },
                    properties: {
                        itemId: camKey,       // URL用
                        internalId: cam.id,   // DB用
                        name: cam.name || "",
                        name_fr: cam.name_french || "",
                        owner: cam.cameraOwner || "",
                        title: "Ottawa Cam:" + camKey
                    }
                };
            });

            return {
                type: "FeatureCollection",
                features: features
            };
        }

        /**
         * クリック時のポップアップ表示
         * 直接URL参照方式 (No-Certificate required)
         */
        async function showOttawaProperty(target) {
            const metaSchema = document.documentElement.getAttribute("property").split(",");
            const metaData = svgMap.parseEscapedCsvLine(target.getAttribute("content"));
            
            const camId = metaData[metaSchema.indexOf("itemId")];
            const camUrl = `${cameraImageBase}${camId}`;
            const ts = new Date().getTime(); // キャッシュ回避用タイムスタンプ

            // モーダルのHTML構築
            let message = `<table border='1' style='font-size:11px; width:100%; border-collapse:collapse; border:solid darkgreen;'>`;
            
            // ライブ画像エリア
            message += `<tr><td colspan="2" style="background:#000; padding:0; text-align:center;">
                            <a target="_blank" href="${camUrl}">
                                <img src="${camUrl}&timems=${ts}" width="100%" style="display:block;" 
                                     onerror="this.src='https://traffic.ottawa.ca/map/images/camera_error.png';">
                            </a>
                        </td></tr>`;

            // プロパティ詳細
            metaData.forEach((itm, idx) => {
                message += `<tr><td style="background:#f0f0f0; width:30%; padding:4px;">${metaSchema[idx]}</td><td style="padding:4px;">${itm || ""}</td></tr>`;
            });
            message += `</table>`;

            // 出典
            message += `
                <div style='font-size:9px; margin-top:10px; color:#555; line-height:1.2; padding:5px; border-top:1px dashed #ccc;'>
                    <b>Source:</b> Contains information from the <a href="https://traffic.ottawa.ca/en/traffic-map-data-lists-and-resources" target="_blank">City of Ottawa Traffic Services</a> 
                </div>`;

            svgMap.showModal(message, 420, 450);
        }
    </script>
</head>
<body>
	<h4>Ottawa City Live Cam Layer</h4>
	<div style="font-size:12px; list-style-type: none; padding: 0;">
		<li style="margin-bottom: 4px;">Source: <a href="https://traffic.ottawa.ca/en/traffic-map-data-lists-and-resources" target="_blank">City of Ottawa Traffic Services</a></li>
		<li style="margin-bottom: 4px;">Icon: <img src="cam1.png" width="18" height="18" style="vertical-align: middle;">
	</div>
</body>
</html>
