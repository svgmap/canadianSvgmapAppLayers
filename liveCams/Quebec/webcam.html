<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Québec Traffic Cams</title>
</head>

<script src="https://cdn.jsdelivr.net/gh/svgmap/svgmapjs@latest/svgMapLayerLib.js"></script>
<script>
// Description:
//	Official Québec 511 traffic camera layer via WFS-GeoJSON
//
// License: (MPL v2)
// This Source Code Form is subject to the terms of the Mozilla Public
// License, v. 2.0. If a copy of the MPL was not distributed with this
// file, You can obtain one at https://mozilla.org/MPL/2.0/.

const endPointUrl = "https://ws.mapserver.transports.gouv.qc.ca/swtq?service=wfs&version=2.0.0&request=getfeature&typename=ms:infos_cameras&outfile=Camera&srsname=EPSG:4326&outputformat=geojson";

onload = async function() {
	// GeoJSONをOpenDataエンドポイントから取得
	const response = await fetch(endPointUrl);
	let gjs = await response.json();
	setTitle(gjs, "DescriptionLocalisationEn");
	
	// 【デバッグ】コンソール出力
	console.log("--- Québec Camera Raw GeoJSON ! ---", gjs);

	//const metaDict = ["title", "itemId", "name", "source", "imageUrl", "desc"];
	const metaDict = Object.keys(gjs.features[0].properties); // とりあえず0番目のもののpropをデフォルト並びで・・・この辺がgeoJSON好きでないところ・・サイズもデカいし
	console.log("metaDict:",metaDict);
	
	// 3. 登録と描画
	svgMap.setShowPoiProperty(showQCProperty, layerID);
	svgImage.documentElement.setAttribute("property", metaDict.join(","));
	
	svgMapGIStool.drawGeoJson(gjs, layerID, "blue", 2, "white", "p1", "title", null, null, metaDict);
	svgMap.refreshScreen();
}

function setTitle(gjs, titlePropName) {
	(gjs.features).forEach(function(item) {
		item.properties.title = item.properties[titlePropName];
	});
}

async function showQCProperty(target) {
	var message = "<table border='1' style='font-size:11px;word-break: break-all;table-layout:fixed;width:100%;border:solid blue;border-collapse: collapse'>";
	message += "<tr><th style='width:25%'>property</th><th>value</th></tr>";

	var metaSchema = target.ownerDocument.firstChild.getAttribute("property").split(",");
	var metaData = svgMap.parseEscapedCsvLine(target.getAttribute("content"));
	console.log("Schema:", metaSchema, "Data:", metaData);

	// 特定のプロパティからIDを抽出するための変数
	let extractedId = "";

	metaData.forEach(function(itm, idx) {
		let displayVal = itm || "";

		// URL_FLUX_DONNEE 内のURLから id=数字 を抽出する
		if (metaSchema[idx] === "URL_FLUX_DONNEE" && itm) {
			const idMatch = itm.match(/[?&]id=(\d+)/);
			if (idMatch && idMatch[1]) {
				extractedId = idMatch[1];
				const videoSrc = `https://www.quebec511.info/Carte/Fenetres/camera.ashx?id=${extractedId}&format=mp4`;
				
				displayVal = `
					<div style="background:#000; padding:2px;">
						<video width="100%" controls autoplay loop muted playsinline 
							style="display:block;" referrerpolicy="no-referrer">
							<source src="${videoSrc}" type="video/mp4">
						</video>
					</div>
					<div style="margin-top:5px; font-size:9px; word-break:break-all;">
						Source: <a href="${itm}" target="_blank">${itm}</a>
					</div>`;
			}
		}
		if ( displayVal ){
			message += "<tr><td>" + metaSchema[idx] + " </td><td> " + displayVal + "</td></tr>";
		}
	});

	// モーダル下部のリンク用。抽出できていなければ itm を使うなどのフォールバック
	const finalVideoPage = extractedId 
		? `https://www.quebec511.info/en/Carte/Fenetres/FenetreVideo.html?id=${extractedId}`
		: "#";

	message += "</table>";
	message += "<div style='font-size:9px; margin-top:5px; color:#666;'>© Gouvernement du Québec</div>";

	svgMap.showModal(message, 450, 540);
}
</script>

<body>
	<h4>Québec Live Cam Layer</h4>
	<div style="font-size:12px;">
		<li>Source: <a href="https://www.donneesquebec.ca/recherche/dataset/camera-de-circulation" target="_blank">Données Québec Traffic Live Cam</a></li>
		<li style="margin-bottom: 4px;">Icon: <img src="cameraFill2.png" width="18" height="18" style="vertical-align: middle;"></li>
	</div>
</body>
</html>
