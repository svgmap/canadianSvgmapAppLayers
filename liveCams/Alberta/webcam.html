/**
 * Alberta 511形式のJSONをGeoJSONに変換し、プロパティリストを生成する
 */
function convertOpen511ToGeoJSON(data, priorityProps = []) {
  const propertySet = new Set();
  
  const features = data.map(item => {
    const properties = {};
    
    // 再帰的にフラット化
    const flatten = (obj, prefix = '') => {
      for (const [key, value] of Object.entries(obj)) {
        // 座標情報はGeometryに使うのでプロパティからは除外（または含めてもOK）
        if (key === 'Latitude' || key === 'Longitude') continue;
        
        // Alberta特有のViews配列から画像URLを抽出
        if (key === 'Views' && Array.isArray(value) && value.length > 0) {
          const urlKey = "imageUrl";
          properties[urlKey] = value[0].Url;
          propertySet.add(urlKey);
          continue; 
        }

        const propName = prefix ? `${prefix}:${key}` : key;

        if (value !== null && typeof value === 'object' && !Array.isArray(value)) {
          flatten(value, propName);
        } else {
          properties[propName] = value;
          propertySet.add(propName);
        }
      }
    };

    flatten(item);

    // ジオメトリの構築 (Albertaは直下に数値として存在)
    const geometry = {
      type: "Point",
      coordinates: [item.Longitude, item.Latitude]
    };

    return {
      type: "Feature",
      geometry: geometry,
      properties: properties
    };
  });

  const allProps = Array.from(propertySet);
  const header = priorityProps.filter(p => propertySet.has(p));
  const remainder = allProps.filter(p => !priorityProps.includes(p)).sort();
  
  return {
    geojson: {
      type: "FeatureCollection",
      features: features
    },
    propertyList: [...header, ...remainder]
  };
}

/**
 * DriveBCのJSONをGeoJSONに変換し、プロパティリストを生成する
 * @param {Array} data - DriveBCのAPIレスポンス
 * @param {Array} priorityProps - 先頭に配置したいプロパティ名の配列 (例: ['name', 'imageUrl'])
 * @returns {Object} { geojson, propertyList }
 */
function convertDriveBCToGeoJSON(data, priorityProps = []) {
  const propertySet = new Set();
  
  const features = data.map(item => {
    const properties = {};
    
    const flatten = (obj, prefix = '') => {
      for (const [key, value] of Object.entries(obj)) {
        if (key === 'location' || key === 'links') continue;
        const propName = prefix ? `${prefix}:${key}` : key;

        if (value !== null && typeof value === 'object' && !Array.isArray(value)) {
          flatten(value, propName);
        } else {
          properties[propName] = value;
          propertySet.add(propName);
        }
      }
    };

    flatten(item);

    // 画像URL等の正規化
    if (item.links?.imageDisplay) {
      properties["imageUrl"] = `https://www.drivebc.ca${item.links.imageDisplay}`;
      propertySet.add("imageUrl");
    }
    if (item.links?.replayTheDay) {
      properties["replayUrl"] = `https://www.drivebc.ca${item.links.replayTheDay}`;
      propertySet.add("replayUrl");
    }

    return {
      type: "Feature",
      geometry: item.location,
      properties: properties
    };
  });

  // プロパティリストの並び替え
  const allProps = Array.from(propertySet);
  // 1. 優先プロパティのうち、実際にデータに存在するものを抽出
  const header = priorityProps.filter(p => propertySet.has(p));
  // 2. それ以外のプロパティをアルファベット順で取得
  const remainder = allProps.filter(p => !priorityProps.includes(p)).sort();
  
  const finalPropertyList = [...header, ...remainder];

  return {
    geojson: {
      type: "FeatureCollection",
      features: features
    },
    propertyList: finalPropertyList
  };
}

// svgMapGIStool.drawGeoJson は、titleプロパティをティッカー表示するので・・・
function setTitle(gjs,titlePropName){
	(gjs.features).forEach(function(item,idx){
		//console.log(item);
		if(item.properties[titlePropName]){
			item.properties.title = item.properties[titlePropName];
			delete item.properties[titlePropName];
		}
	});
}
